<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שיבוץ חדר 422</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #dbe3ee;
      --primary: #1e40af;
      --primary-light: #dbeafe;
      --free-bg: #e9f9ef;
      --free-text: #166534;
      --busy-bg: #fff1f2;
      --busy-text: #9f1239;
      --warn-bg: #fff7ed;
      --warn-text: #9a3412;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans Hebrew", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #e0f2fe 0, transparent 32%), var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: linear-gradient(135deg, #ffffff, #eef6ff);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px 24px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 38px);
      letter-spacing: -0.03em;
    }

    h2 { margin: 0 0 14px; font-size: 20px; }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .badge {
      background: #eff6ff;
      color: #1e3a8a;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 380px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-grid.two { grid-template-columns: repeat(2, 1fr); }

    label span {
      display: block;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
    }

    input, select, button {
      font-family: inherit;
      font-size: 15px;
    }

    input, select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.18s ease;
      touch-action: manipulation;
    }

    button:hover { opacity: 0.88; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      width: 100%;
      background: var(--primary);
      color: white;
      min-height: 44px;
    }

    .secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .message {
      display: none;
      margin: 12px 0;
      border-radius: 14px;
      padding: 11px 14px;
      font-weight: 700;
      line-height: 1.45;
      font-size: 14px;
    }

    .message.show { display: block; }
    .message.success { background: var(--free-bg); color: var(--free-text); }
    .message.error { background: var(--busy-bg); color: var(--busy-text); }
    .message.warn { background: var(--warn-bg); color: var(--warn-text); }

    /* ── DESKTOP TABLE ── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
    }

    table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: #eff4fb;
      color: #1e293b;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      white-space: nowrap;
    }

    th:first-child { text-align: right; width: 80px; }

    td {
      padding: 7px;
      border-bottom: 1px solid #edf2f7;
      vertical-align: top;
    }

    .hour-cell {
      font-weight: 800;
      color: #334155;
      white-space: nowrap;
      font-size: 13px;
    }

    .date-small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      margin-top: 3px;
    }

    .slot-free {
      width: 100%;
      background: var(--free-bg);
      color: var(--free-text);
      min-height: 50px;
      font-size: 13px;
    }

    .slot-busy {
      background: var(--busy-bg);
      color: var(--busy-text);
      border-radius: 12px;
      padding: 8px;
      min-height: 60px;
    }

    .slot-busy strong { display: block; margin-bottom: 4px; font-size: 12px; }
    .slot-busy small { display: block; line-height: 1.35; font-size: 12px; }

    .delete-btn {
      margin-top: 6px;
      padding: 0;
      color: var(--busy-text);
      background: transparent;
      text-decoration: underline;
      font-size: 11px;
    }

    /* ── MOBILE CARD VIEW ── */
    .mobile-view { display: none; }

    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .week-nav button {
      background: var(--primary-light);
      color: var(--primary);
      padding: 10px 16px;
      flex-shrink: 0;
    }

    .week-nav span {
      font-weight: 700;
      font-size: 14px;
      text-align: center;
    }

    .day-accordion {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      background: #eff4fb;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .day-header .day-badge {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
    }

    .day-chevron {
      font-size: 12px;
      transition: transform 0.2s;
    }

    .day-body { display: none; background: white; }
    .day-body.open { display: block; }

    .hour-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #edf2f7;
    }

    .hour-row:last-child { border-bottom: none; }

    .hour-label {
      font-weight: 800;
      font-size: 14px;
      color: #334155;
      width: 54px;
      flex-shrink: 0;
    }

    .hour-content { flex: 1; }

    .mobile-slot-free {
      background: var(--free-bg);
      color: var(--free-text);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      width: 100%;
      text-align: right;
    }

    .mobile-slot-busy {
      background: var(--busy-bg);
      color: var(--busy-text);
      border-radius: 10px;
      padding: 9px 12px;
    }

    .mobile-slot-busy strong { display: block; font-size: 13px; margin-bottom: 3px; }
    .mobile-slot-busy small { font-size: 12px; }

    .mobile-delete-btn {
      margin-top: 6px;
      padding: 0;
      background: transparent;
      color: var(--busy-text);
      text-decoration: underline;
      font-size: 12px;
    }

    /* ── SIDEBAR ── */
    .side-list {
      display: grid;
      gap: 8px;
      max-height: 480px;
      overflow: auto;
    }

    .booking-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px 12px;
      background: #fff;
    }

    .booking-item strong { display: block; margin-bottom: 4px; font-size: 13px; }
    .booking-item span { color: var(--muted); font-size: 13px; }

    .actions-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .actions-row button { flex: 1; font-size: 13px; min-height: 40px; }

    /* ── SHARE SECTION ── */
    .share-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .share-row button { flex: 1; font-size: 13px; min-height: 40px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1060px) {
      .layout { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      header { flex-direction: column; align-items: stretch; }
      .badge { max-width: none; }
    }

    @media (max-width: 700px) {
      .container { padding: 12px; }
      .form-grid, .form-grid.two { grid-template-columns: 1fr; }
      header, .card { border-radius: 16px; }
      .desktop-view { display: none; }
      .mobile-view { display: block; }
    }

    @media (min-width: 701px) {
      .desktop-view { display: block; }
      .mobile-view { display: none; }
    }

    @media print {
      body { background: white; }
      .controls, aside, .badge, button, input, select { display: none !important; }
      .layout { display: block; }
      .mobile-view { display: none !important; }
      .desktop-view { display: block !important; }
      header, .card { box-shadow: none; border: 1px solid #ccc; }
      table { min-width: 0; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>שיבוץ שימוש בחדר 422</h1>
        <p class="subtitle">ימים ראשון עד חמישי, בין השעות 08:00–19:00</p>
      </div>
      <div class="badge">
        שינויים נשמרים בדפדפן המקומי. לשיתוף עם אחרים — השתמשו ב<strong>ייצוא/ייבוא JSON</strong> או ב<strong>קישור שיתוף</strong>.
      </div>
    </header>

    <div class="layout">
      <main>
        <section class="card controls">
          <h2>שיבוץ חדר</h2>
          <div class="form-grid">
            <label>
              <span>בחר/י שבוע לפי תאריך</span>
              <input type="date" id="selectedDate" />
            </label>
            <label>
              <span>שם המשתמש/ת</span>
              <input type="text" id="bookerName" placeholder='לדוגמה: ד"ר כהן' autocomplete="off" />
            </label>
            <label>
              <span>שעת שיבוץ לטווח</span>
              <select id="selectedHour"></select>
            </label>
            <label>
              <span>&nbsp;</span>
              <button class="primary" id="rangeBookBtn">שבץ טווח תאריכים</button>
            </label>
          </div>
          <div class="form-grid two">
            <label>
              <span>מתאריך</span>
              <input type="date" id="rangeStart" />
            </label>
            <label>
              <span>עד תאריך</span>
              <input type="date" id="rangeEnd" />
            </label>
          </div>
          <div id="message" class="message"></div>
          <div class="actions-row">
            <button class="secondary" id="resetBtn">אפס לשיבוצים המקוריים</button>
            <button class="secondary" onclick="window.print()">הדפס לוח</button>
          </div>
          <div class="share-row">
            <button class="secondary" id="exportBtn">ייצוא JSON</button>
            <button class="secondary" id="importBtn">ייבוא JSON</button>
            <button class="secondary" id="shareLinkBtn">🔗 קישור שיתוף</button>
          </div>
          <input type="file" id="importFile" accept=".json" style="display:none" />
        </section>

        <!-- Desktop table view -->
        <section class="card desktop-view">
          <div class="table-wrap">
            <table id="calendarTable"></table>
          </div>
        </section>

        <!-- Mobile card view -->
        <section class="card mobile-view">
          <div class="week-nav">
            <button id="prevWeekBtn">→ שבוע קודם</button>
            <span id="weekLabel"></span>
            <button id="nextWeekBtn">שבוע הבא ←</button>
          </div>
          <div id="mobileCalendar"></div>
        </section>
      </main>

      <aside>
        <section class="card controls">
          <h2>שאילתת זמינות</h2>
          <label>
            <span>תאריך</span>
            <input type="date" id="queryDate" />
          </label>
          <br />
          <label>
            <span>שעה</span>
            <select id="queryHour"></select>
          </label>
          <br />
          <button class="primary" id="checkBtn">בדוק זמינות</button>
          <div id="queryResult" class="message"></div>
        </section>

        <section class="card">
          <h2>שיבוצים קיימים</h2>
          <div id="bookingsList" class="side-list"></div>
        </section>
      </aside>
    </div>
  </div>

  <script>
    const DAYS_HE = ["ראשון", "שני", "שלישי", "רביעי", "חמישי"];
    const HOURS = Array.from({ length: 12 }, (_, i) => `${String(i + 8).padStart(2, "0")}:00`);
    const STORAGE_KEY = "room_422_bookings_v2";

    const INITIAL_BOOKINGS = {
      "2026-05-04_10:00": { name: "קורס דוקטורנטים", createdAt: "imported-from-sheet" },
      "2026-05-04_11:00": { name: "פגישה - טקס חלוקת תעודות", createdAt: "imported-from-sheet" },
      "2026-05-04_12:00": { name: "מוחמד", createdAt: "imported-from-sheet" },
      "2026-05-04_13:00": { name: "תיאום הצגת רשות אקדמה", createdAt: "imported-from-sheet" },
      "2026-05-04_14:00": { name: "המחקר ואני", createdAt: "imported-from-sheet" },
      "2026-05-04_15:00": { name: "איתי קורס חדשנות", createdAt: "imported-from-sheet" },
      "2026-05-04_16:00": { name: "איתי קורס חדשנות", createdAt: "imported-from-sheet" },
      "2026-05-04_17:00": { name: "נריה מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-05_12:00": { name: "בן שחר קורס שנתי", createdAt: "imported-from-sheet" },
      "2026-05-05_13:00": { name: "מוחמד", createdAt: "imported-from-sheet" },
      "2026-05-05_16:00": { name: "נריה - מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-11_10:00": { name: "תכנית לימודים תשפז", createdAt: "imported-from-sheet" },
      "2026-05-11_12:00": { name: "בן שחר קורס שנתי", createdAt: "imported-from-sheet" },
      "2026-05-11_16:00": { name: "נריה - מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-11_17:00": { name: "נריה - מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-12_10:00": { name: "מפגש בנושא מלג", createdAt: "imported-from-sheet" },
      "2026-05-13_10:00": { name: "קורס דוקטורנטים", createdAt: "imported-from-sheet" },
      "2026-05-13_12:00": { name: "מירי מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-13_13:00": { name: "מירי מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-18_10:00": { name: "קורס דוקטורנטים", createdAt: "imported-from-sheet" },
      "2026-05-18_12:00": { name: "בן שחר קורס שנתי", createdAt: "imported-from-sheet" },
      "2026-05-18_16:00": { name: "נריה - מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-18_17:00": { name: "נריה - מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-19_14:00": { name: "תכנית מצטיינים", createdAt: "imported-from-sheet" },
      "2026-05-21_09:00": { name: "ועדת משמעת", createdAt: "imported-from-sheet" },
      "2026-05-25_09:00": { name: "ישיבת הנהלה", createdAt: "imported-from-sheet" },
      "2026-05-25_10:00": { name: "מרכז לחקר הזקנה", createdAt: "imported-from-sheet" },
      "2026-05-25_14:00": { name: "מפגש מרכז מסילה", createdAt: "imported-from-sheet" },
      "2026-05-25_16:00": { name: "נריה - מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-25_17:00": { name: "נריה - מעורבות חברתית", createdAt: "imported-from-sheet" },
      "2026-05-26_09:00": { name: "ועדת משמעת", createdAt: "imported-from-sheet" },
      "2026-05-26_10:00": { name: "הדרכת מדריכים - עמי קרצמר", createdAt: "imported-from-sheet" },
      "2026-05-26_11:00": { name: "הדרכת מדריכים - עמי קרצמר", createdAt: "imported-from-sheet" },
      "2026-05-26_12:00": { name: "הדרכת מדריכים - עמי קרצמר", createdAt: "imported-from-sheet" },
      "2026-05-27_09:00": { name: "שירי", createdAt: "imported-from-sheet" },
      "2026-05-27_10:00": { name: "קורס בינלאומי זום - אשר בן אריה", createdAt: "imported-from-sheet" },
      "2026-05-27_11:00": { name: "קורס בינלאומי זום - אשר בן אריה", createdAt: "imported-from-sheet" },
      "2026-05-27_12:00": { name: "בן שחר קורס שנתי", createdAt: "imported-from-sheet" },
      "2026-05-28_10:00": { name: "קורס בינלאומי זום - אשר בן אריה", createdAt: "imported-from-sheet" },
      "2026-06-01_12:00": { name: "מפגש סטודנטים קורס ניו יורק", createdAt: "imported-from-sheet" }
    };

    let bookings = loadBookings();
    let openDays = new Set();

    /* ── Helpers ── */

    function toISODate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatHebrewDate(ds) {
      return new Date(`${ds}T12:00:00`).toLocaleDateString("he-IL", {
        day: "2-digit", month: "2-digit", year: "numeric"
      });
    }

    function getWeekDates(selectedDateString) {
      const selected = new Date(`${selectedDateString}T12:00:00`);
      const sunday = new Date(selected);
      sunday.setDate(selected.getDate() - selected.getDay());
      return DAYS_HE.map((dayName, index) => {
        const date = new Date(sunday);
        date.setDate(sunday.getDate() + index);
        return { dayName, dateString: toISODate(date) };
      });
    }

    function isWeekday(ds) {
      const d = new Date(`${ds}T12:00:00`).getDay();
      return d >= 0 && d <= 4;
    }

    function buildKey(date, hour) { return `${date}_${hour}`; }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /* ── Storage ── */

    function loadBookings() {
      // 1. Try URL hash (shared link)
      if (location.hash && location.hash.length > 1) {
        try {
          const data = JSON.parse(decodeURIComponent(atob(location.hash.slice(1))));
          if (data && typeof data === "object") {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            history.replaceState(null, "", location.pathname);
            return data;
          }
        } catch { /* ignore bad hash */ }
      }
      // 2. Try localStorage
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch { /* ignore */ }
      return { ...INITIAL_BOOKINGS };
    }

    function saveBookings() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
      } catch (e) {
        setMessage("message", "warn", "אזהרה: לא ניתן לשמור בדפדפן זה. השתמש/י בייצוא JSON.");
      }
    }

    /* ── Messages ── */

    function setMessage(id, type, text) {
      const el = document.getElementById(id);
      el.className = `message show ${type}`;
      el.textContent = text;
    }

    function clearMessage(id) {
      const el = document.getElementById(id);
      el.className = "message";
      el.textContent = "";
    }

    /* ── Hour selects ── */

    function populateHourSelects() {
      ["selectedHour", "queryHour"].forEach(id => {
        const s = document.getElementById(id);
        s.innerHTML = HOURS.map(h => `<option value="${h}">${h}</option>`).join("");
      });
    }

    /* ── Desktop calendar ── */

    function renderCalendar() {
      const selectedDate = document.getElementById("selectedDate").value;
      const weekDates = getWeekDates(selectedDate);
      const table = document.getElementById("calendarTable");

      let html = `<thead><tr><th>שעה</th>`;
      weekDates.forEach(day => {
        html += `<th>${day.dayName}<span class="date-small">${formatHebrewDate(day.dateString)}</span></th>`;
      });
      html += `</tr></thead><tbody>`;

      HOURS.forEach(hour => {
        html += `<tr><td class="hour-cell">${hour}</td>`;
        weekDates.forEach(day => {
          const key = buildKey(day.dateString, hour);
          const booking = bookings[key];
          html += `<td>`;
          if (booking) {
            html += `<div class="slot-busy"><strong>תפוס</strong><small>${escapeHtml(booking.name)}</small><button class="delete-btn" onclick="deleteBooking('${day.dateString}','${hour}')">מחק שיבוץ</button></div>`;
          } else {
            html += `<button class="slot-free" onclick="bookSlot('${day.dateString}','${hour}')">פנוי — שבץ</button>`;
          }
          html += `</td>`;
        });
        html += `</tr>`;
      });

      html += `</tbody>`;
      table.innerHTML = html;
      renderMobileCalendar();
      renderBookingsList();
    }

    /* ── Mobile calendar ── */

    function renderMobileCalendar() {
      const selectedDate = document.getElementById("selectedDate").value;
      const weekDates = getWeekDates(selectedDate);

      // week label
      const first = weekDates[0].dateString;
      const last = weekDates[weekDates.length - 1].dateString;
      document.getElementById("weekLabel").textContent =
        `${formatHebrewDate(first)} – ${formatHebrewDate(last)}`;

      const container = document.getElementById("mobileCalendar");
      let html = "";

      weekDates.forEach(day => {
        const busyCount = HOURS.filter(h => bookings[buildKey(day.dateString, h)]).length;
        const isOpen = openDays.has(day.dateString);

        html += `<div class="day-accordion">
          <div class="day-header" onclick="toggleDay('${day.dateString}')">
            <span>${day.dayName} <span class="day-badge">${formatHebrewDate(day.dateString)}${busyCount ? ` · ${busyCount} תפוסות` : ""}</span></span>
            <span class="day-chevron">${isOpen ? "▲" : "▼"}</span>
          </div>
          <div class="day-body${isOpen ? " open" : ""}">`;

        HOURS.forEach(hour => {
          const key = buildKey(day.dateString, hour);
          const booking = bookings[key];
          html += `<div class="hour-row">
            <span class="hour-label">${hour}</span>
            <div class="hour-content">`;
          if (booking) {
            html += `<div class="mobile-slot-busy">
              <strong>תפוס</strong>
              <small>${escapeHtml(booking.name)}</small>
              <button class="mobile-delete-btn" onclick="deleteBooking('${day.dateString}','${hour}')">מחק שיבוץ</button>
            </div>`;
          } else {
            html += `<button class="mobile-slot-free" onclick="bookSlot('${day.dateString}','${hour}')">פנוי — שבץ</button>`;
          }
          html += `</div></div>`;
        });

        html += `</div></div>`;
      });

      container.innerHTML = html;
    }

    function toggleDay(dateString) {
      if (openDays.has(dateString)) {
        openDays.delete(dateString);
      } else {
        openDays.add(dateString);
      }
      renderMobileCalendar();
    }

    /* ── Week navigation ── */

    function shiftWeek(delta) {
      const input = document.getElementById("selectedDate");
      const d = new Date(`${input.value}T12:00:00`);
      d.setDate(d.getDate() + delta * 7);
      input.value = toISODate(d);
      openDays.clear();
      renderCalendar();
    }

    /* ── Booking list ── */

    function renderBookingsList() {
      const list = document.getElementById("bookingsList");
      const items = Object.entries(bookings)
        .map(([key, value]) => {
          const [date, hour] = key.split("_");
          return { date, hour, ...value };
        })
        .sort((a, b) => `${a.date}_${a.hour}`.localeCompare(`${b.date}_${b.hour}`));

      if (!items.length) {
        list.innerHTML = `<p style="color:var(--muted);margin:0;">אין עדיין שיבוצים.</p>`;
        return;
      }

      list.innerHTML = items.map(item => `
        <div class="booking-item">
          <strong>${formatHebrewDate(item.date)} | ${item.hour}</strong>
          <span>${escapeHtml(item.name)}</span>
        </div>
      `).join("");
    }

    /* ── Actions ── */

    function bookSlot(date, hour) {
      if (!isWeekday(date)) {
        setMessage("message", "error", "לא ניתן לשבץ בימי שישי או שבת.");
        return;
      }
      const key = buildKey(date, hour);
      if (bookings[key]) {
        setMessage("message", "error", "החדר כבר משובץ במועד זה.");
        return;
      }
      const name = document.getElementById("bookerName").value.trim() || "משתמש/ת ללא שם";
      bookings[key] = { name, createdAt: new Date().toISOString() };
      saveBookings();
      setMessage("message", "success", `השיבוץ בוצע בהצלחה עבור ${name}.`);
      renderCalendar();
    }

    function bookRange() {
      const rangeStart = document.getElementById("rangeStart").value;
      const rangeEnd = document.getElementById("rangeEnd").value;
      const selectedHour = document.getElementById("selectedHour").value;

      if (!rangeStart || !rangeEnd) {
        setMessage("message", "error", "נא למלא תאריך התחלה וסיום.");
        return;
      }

      const start = new Date(`${rangeStart}T12:00:00`);
      const end = new Date(`${rangeEnd}T12:00:00`);

      if (end < start) {
        setMessage("message", "error", "תאריך הסיום חייב להיות אחרי תאריך ההתחלה.");
        return;
      }

      const datesToBook = [];
      const current = new Date(start);
      while (current <= end) {
        const ds = toISODate(current);
        if (isWeekday(ds)) datesToBook.push(ds);
        current.setDate(current.getDate() + 1);
      }

      const conflicts = datesToBook.filter(d => bookings[buildKey(d, selectedHour)]);
      if (conflicts.length > 0) {
        setMessage("message", "error", `לא ניתן להשלים. נמצאו ${conflicts.length} מועדים תפוסים בטווח.`);
        return;
      }

      const name = document.getElementById("bookerName").value.trim() || "משתמש/ת ללא שם";
      datesToBook.forEach(d => {
        bookings[buildKey(d, selectedHour)] = { name, createdAt: new Date().toISOString() };
      });
      saveBookings();
      setMessage("message", "success", `בוצעו ${datesToBook.length} שיבוצים בהצלחה.`);
      renderCalendar();
    }

    function deleteBooking(date, hour) {
      const key = buildKey(date, hour);
      delete bookings[key];
      saveBookings();
      setMessage("message", "success", "השיבוץ נמחק.");
      renderCalendar();
    }

    function checkAvailability() {
      const queryDate = document.getElementById("queryDate").value;
      const queryHour = document.getElementById("queryHour").value;
      if (!queryDate) { setMessage("queryResult", "warn", "נא לבחור תאריך."); return; }
      if (!isWeekday(queryDate)) {
        setMessage("queryResult", "error", "החדר אינו פעיל בימי שישי או שבת.");
        return;
      }
      const booking = bookings[buildKey(queryDate, queryHour)];
      if (booking) {
        setMessage("queryResult", "error",
          `החדר תפוס ב-${formatHebrewDate(queryDate)} ${queryHour}.\nמשובץ ל: ${booking.name}.`);
      } else {
        setMessage("queryResult", "success",
          `החדר פנוי ב-${formatHebrewDate(queryDate)} ${queryHour}.`);
      }
    }

    function resetBookings() {
      if (!confirm("לאפס את כל השינויים ולחזור לשיבוצים המקוריים?")) return;
      bookings = { ...INITIAL_BOOKINGS };
      saveBookings();
      openDays.clear();
      clearMessage("queryResult");
      setMessage("message", "success", "המערכת אופסה לשיבוצים המקוריים.");
      renderCalendar();
    }

    /* ── Export / Import / Share ── */

    function exportJSON() {
      const data = JSON.stringify(bookings, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const dateStr = toISODate(new Date());
      a.href = url;
      a.download = `room_422_bookings_${dateStr}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setMessage("message", "success", "הקובץ יוצא בהצלחה. שלח/י אותו לשאר המשתמשים לייבוא.");
    }

    function importJSON() {
      document.getElementById("importFile").click();
    }

    function handleImportFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (typeof data !== "object" || Array.isArray(data)) throw new Error("invalid");
          const count = Object.keys(data).length;
          if (!confirm(`ייבוא ${count} שיבוצים. שיבוצים קיימים יימחקו. להמשיך?`)) return;
          bookings = data;
          saveBookings();
          openDays.clear();
          setMessage("message", "success", `יובאו ${count} שיבוצים בהצלחה.`);
          renderCalendar();
        } catch {
          setMessage("message", "error", "שגיאה בקריאת הקובץ. ודא/י שמדובר בקובץ JSON תקין.");
        }
        e.target.value = "";
      };
      reader.readAsText(file);
    }

    function generateShareLink() {
      try {
        const encoded = btoa(encodeURIComponent(JSON.stringify(bookings)));
        const url = `${location.origin}${location.pathname}#${encoded}`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url)
            .then(() => setMessage("message", "success", "הקישור הועתק ללוח! הדבק/י אותו ושתף/י עם האחרים."))
            .catch(() => promptShareLink(url));
        } else {
          promptShareLink(url);
        }
      } catch {
        setMessage("message", "error", "לא ניתן לייצר קישור כעת. השתמש/י בייצוא JSON.");
      }
    }

    function promptShareLink(url) {
      const shortened = url.length > 80 ? url.slice(0, 77) + "..." : url;
      prompt("העתק/י את הקישור הבא:", url);
    }

    /* ── Init ── */

    function init() {
      const today = toISODate(new Date());
      document.getElementById("selectedDate").value = today;
      document.getElementById("rangeStart").value = today;
      document.getElementById("rangeEnd").value = today;
      document.getElementById("queryDate").value = today;

      populateHourSelects();

      document.getElementById("selectedDate").addEventListener("change", () => {
        openDays.clear();
        renderCalendar();
      });
      document.getElementById("rangeBookBtn").addEventListener("click", bookRange);
      document.getElementById("checkBtn").addEventListener("click", checkAvailability);
      document.getElementById("resetBtn").addEventListener("click", resetBookings);
      document.getElementById("exportBtn").addEventListener("click", exportJSON);
      document.getElementById("importBtn").addEventListener("click", importJSON);
      document.getElementById("shareLinkBtn").addEventListener("click", generateShareLink);
      document.getElementById("importFile").addEventListener("change", handleImportFile);
      document.getElementById("prevWeekBtn").addEventListener("click", () => shiftWeek(-1));
      document.getElementById("nextWeekBtn").addEventListener("click", () => shiftWeek(1));

      renderCalendar();
    }

    init();
  </script>
</body>
</html>
